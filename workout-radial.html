<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小本奔｜課表框架系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root { --orange:#E3752D; --orange2:#F5A050; --cream:#FFF0CA; --cream2:#FFF8E8; --brown:#3D2B0F; --brown2:#7A5530; --border:rgba(161,98,42,0.22); }
* { box-sizing:border-box; margin:0; padding:0; }
html,body { background:#FFF0CA !important; color:#3D2B0F !important; font-family:'Noto Sans TC',sans-serif; min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; top:-150px; left:50%; transform:translateX(-50%); width:700px; height:500px; background:radial-gradient(ellipse,rgba(227,117,45,0.10) 0%,transparent 65%); pointer-events:none; z-index:0; }
.header { text-align:center; padding:48px 24px 28px; position:relative; z-index:1; }
.header h1 { font-size:clamp(20px,4vw,36px); font-weight:700; line-height:1.35; margin-bottom:8px; color:#3D2B0F; }
.header h1 em { color:#E3752D; font-style:normal; }
.flow-strip { display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; padding:0 24px 40px; position:relative; z-index:1; }
.flow-node { display:flex; flex-direction:column; align-items:center; background:#fff8e8; border:1.5px solid var(--border); border-radius:12px; padding:11px 18px; min-width:86px; box-shadow:0 2px 8px rgba(161,98,42,0.07); }
.flow-node .n { font-size:26px; font-weight:700; color:#E3752D; line-height:1; }
.flow-node .n sup { font-size:13px; }
.flow-node .l { font-size:11px; color:#7A5530; margin-top:3px; letter-spacing:1px; }
.flow-arr { color:#F5A050; font-size:18px; opacity:.7; }
.flow-node.hl { border-color:#E3752D; background:rgba(227,117,45,0.08); }
.flow-node.hl .n { font-size:18px; padding-top:4px; }
.radial-section { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; padding:0 16px 40px; }
.radial-label { text-align:center; margin-bottom:20px; }
.radial-label h2 { font-size:17px; font-weight:700; margin-bottom:4px; color:#3D2B0F; }
.radial-label p { font-size:12px; color:#7A5530; letter-spacing:1px; }
.radial-wrap { width:min(560px,96vw); aspect-ratio:1; margin-bottom:24px; }
#radialSvg { width:100%; height:100%; overflow:visible; }
.wedge-path { fill:#fff8e8; stroke:#FFF0CA; stroke-width:3; transition:fill .3s,stroke .3s; cursor:pointer; }
.wedge-group:hover .wedge-path { fill:#fde8c4; }
.wedge-group.table-lit .wedge-path { fill:rgba(227,117,45,0.13); stroke:#E3752D; stroke-width:3; }
.wedge-group.active .wedge-path { fill:rgba(227,117,45,0.22); stroke:#E3752D; stroke-width:3; }
.wedge-group { cursor:pointer; }
.detail-panel { width:min(560px,96vw); background:#fff8e8; border:1.5px solid var(--border); border-top:3px solid #E3752D; border-radius:14px; overflow:hidden; display:none; animation:slideUp .25s ease; box-shadow:0 4px 20px rgba(161,98,42,0.10); }
.detail-panel.visible { display:block; }
@keyframes slideUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
.dp-header { display:flex; align-items:center; gap:14px; padding:16px 20px; border-bottom:1px solid var(--border); }
.dp-icon { width:44px; height:44px; border-radius:10px; background:#E3752D; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
.dp-title { font-size:19px; font-weight:700; color:#3D2B0F; }
.dp-tag { font-size:11px; color:#F5A050; letter-spacing:1px; margin-top:2px; }
.dp-count { margin-left:auto; text-align:right; }
.dp-count strong { display:block; font-size:26px; font-weight:700; color:#E3752D; line-height:1; }
.dp-count span { font-size:11px; color:#7A5530; }
.dp-body { padding:14px 20px 18px; }
.dp-section-label { font-size:10px; letter-spacing:2.5px; color:#E3752D; text-transform:uppercase; margin-bottom:9px; }
.base-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.base-chip { background:rgba(227,117,45,0.12); border:1.5px solid rgba(227,117,45,0.38); border-radius:8px; font-size:13px; font-weight:500; color:#3D2B0F; padding:4px 13px; }
.var-grid { display:flex; flex-wrap:wrap; gap:6px; }
.var-chip { background:#fff3d6; border:1px solid rgba(161,98,42,0.18); border-radius:20px; font-size:12px; color:#3D2B0F; padding:4px 12px; transition:all .2s; }
.var-chip:hover { background:rgba(227,117,45,0.12); border-color:#F5A050; }
.link-card-wrap { max-width:560px; margin:0 auto 48px; padding:0 16px; }
.link-card { display:block; border-radius:16px; overflow:hidden; box-shadow:0 4px 20px rgba(161,98,42,0.15); border:1.5px solid rgba(161,98,42,0.2); text-decoration:none; background:#fff8e8; transition:transform 0.2s,box-shadow 0.2s; }
.link-card:hover { transform:translateY(-3px); box-shadow:0 8px 28px rgba(161,98,42,0.22); }
.link-card img { width:100%; height:120px; object-fit:cover; object-position:center 45%; display:block; }
.link-card-body { padding:16px 20px 18px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center; }
.link-card-text { font-size:15px; font-weight:700; color:#3D2B0F; margin-bottom:4px; }
.link-card-url { font-size:12px; color:#A0622A; letter-spacing:1px; }
.link-card-btn { background:#E3752D; color:#FFF0CA; font-size:12px; font-weight:700; padding:8px 16px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
</style>
</head>
<body>

<div class="header">
  <h1><em>12</em> 個動作 × 變化<br>填入框架 → 自主訓練</h1>
</div>

<div class="flow-strip">
  <div class="flow-node"><div class="n">12</div><div class="l">基本動作</div></div>
  <div class="flow-arr">›</div>
  <div class="flow-node"><div class="n">60<sup>+</sup></div><div class="l">動作變化</div></div>
  <div class="flow-arr">›</div>
  <div class="flow-node"><div class="n">2</div><div class="l">課表框架</div></div>
  <div class="flow-arr">›</div>
  <div class="flow-node hl"><div class="n">∞</div><div class="l">全身性課表</div></div>
</div>

<div class="radial-section">
  <div class="radial-label">
    <h2>課表框架全覽</h2>
    <p>點擊中心「課表1／課表2」亮燈，再點各扇形展開動作選項</p>
  </div>
  <div class="radial-wrap">
    <svg id="radialSvg" viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="detail-panel" id="detailPanel">
    <div class="dp-header">
      <div class="dp-icon" id="dpIcon"></div>
      <div>
        <div class="dp-title" id="dpTitle"></div>
        <div class="dp-tag" id="dpTag"></div>
      </div>
      <div class="dp-count"><strong id="dpCount"></strong><span>種選擇</span></div>
    </div>
    <div class="dp-body">
      <div class="dp-section-label">基本動作</div>
      <div class="base-row" id="dpBases"></div>
      <div class="dp-section-label">所有變化選項</div>
      <div class="var-grid" id="dpVars"></div>
    </div>
  </div>
</div>

<div class="link-card-wrap">
  <a class="link-card" href="https://iisanosbb.github.io/workout-list.html" target="_blank" rel="noopener">
    
    <div class="link-card-body">
      <div>
        <div class="link-card-text">超好用的課表產生器</div>
        <div class="link-card-url">iisanosbb.github.io</div>
      </div>
      <div class="link-card-btn">立即體驗 →</div>
    </div>
  </a>
</div>

var rFill=el('rect',{id:'rightFill',x:CX,y:CY-(CENTER_DECA_R+20),width:CENTER_DECA_R+20,height:(CENTER_DECA_R+20)*2,'clip-path':'url(#clipR)',fill:'rgba(61,43,15,0.0)'});
cG.appendChild(rFill);
var dY1=CY-(CENTER_DECA_R+16)*0.95, dY2=CY+(CENTER_DECA_R+16)*0.95;
cG.appendChild(el('line',{x1:CX,y1:dY1,x2:CX,y2:dY2,stroke:'#FFF0CA','stroke-width':'3'}));

var leftT=el('g',{id:'centerLeft'}); leftT.style.cursor='pointer';
leftT.appendChild(tx('課表',{id:'lbl1',x:CX-28,y:CY-12,'font-family':'Noto Sans TC','font-weight':'700','font-size':'15',fill:'#3D2B0F','text-anchor':'middle','dominant-baseline':'middle'}));
leftT.appendChild(tx('1',{id:'lbl2',x:CX-28,y:CY+11,'font-family':'Noto Sans TC','font-weight':'700','font-size':'20',fill:'#3D2B0F','text-anchor':'middle','dominant-baseline':'middle'}));
leftT.appendChild(el('rect',{x:CX-(CENTER_DECA_R+20),y:CY-(CENTER_DECA_R+20),width:CENTER_DECA_R+20,height:(CENTER_DECA_R+20)*2,'clip-path':'url(#clipL)',fill:'rgba(0,0,0,0)'}));
leftT.addEventListener('click',function(){activateTable(1);});
cG.appendChild(leftT);

var rightT=el('g',{id:'centerRight'}); rightT.style.cursor='pointer';
rightT.appendChild(tx('課表',{id:'lbl3',x:CX+28,y:CY-12,'font-family':'Noto Sans TC','font-weight':'700','font-size':'15',fill:'#3D2B0F','text-anchor':'middle','dominant-baseline':'middle'}));
rightT.appendChild(tx('2',{id:'lbl4',x:CX+28,y:CY+11,'font-family':'Noto Sans TC','font-weight':'700','font-size':'20',fill:'#3D2B0F','text-anchor':'middle','dominant-baseline':'middle'}));
rightT.appendChild(el('rect',{x:CX,y:CY-(CENTER_DECA_R+20),width:CENTER_DECA_R+20,height:(CENTER_DECA_R+20)*2,'clip-path':'url(#clipR)',fill:'rgba(0,0,0,0)'}));
rightT.addEventListener('click',function(){activateTable(2);});
cG.appendChild(rightT);
svg.appendChild(cG);

var activeTable=null, activeSlot=null;

function activateTable(t){
  if(activeTable===t){clearAll();return;}
  clearAll(); activeTable=t;
  for(var i=0;i<wedgeGroups.length;i++){if(slots[i].table===t) wedgeGroups[i].classList.add('table-lit');}
  if(t===1){
    lFill.setAttribute('fill','rgba(227,117,45,0.18)');
    document.getElementById('lbl1').setAttribute('fill','#E3752D');
    document.getElementById('lbl2').setAttribute('fill','#E3752D');
  } else {
    rFill.setAttribute('fill','rgba(227,117,45,0.18)');
    document.getElementById('lbl3').setAttribute('fill','#E3752D');
    document.getElementById('lbl4').setAttribute('fill','#E3752D');
  }
}
function clearAll(){
  activeTable=null;
  for(var i=0;i<wedgeGroups.length;i++) wedgeGroups[i].classList.remove('table-lit');
  lFill.setAttribute('fill','rgba(61,43,15,0.05)');
  rFill.setAttribute('fill','rgba(61,43,15,0.0)');
  ['lbl1','lbl2','lbl3','lbl4'].forEach(function(id){document.getElementById(id).setAttribute('fill','#3D2B0F');});
  clearSlot();
}
function selectSlot(i){
  if(activeSlot===i){clearSlot();return;}
  clearSlot(); activeSlot=i;
  wedgeGroups[i].classList.add('active');
  showDetail(slots[i]);
}
function clearSlot(){
  if(activeSlot!==null){wedgeGroups[activeSlot].classList.remove('active');activeSlot=null;}
  document.getElementById('detailPanel').classList.remove('visible');
}
function showDetail(s){
  var dpIconEl=document.getElementById('dpIcon');
  dpIconEl.innerHTML='';
  if(svgIcons[s.name]){
    var img=document.createElement('img');
    img.src=svgIcons[s.name];
    img.style.cssText='width:30px;height:30px;object-fit:contain;filter:brightness(0) invert(1);';
    dpIconEl.appendChild(img);
  }
  document.getElementById('dpTitle').textContent=s.name;
  document.getElementById('dpTag').textContent=s.tag;
  document.getElementById('dpCount').textContent=s.vars.length;
  document.getElementById('dpBases').innerHTML=s.bases.map(function(b){return '<span class="base-chip">'+b+'</span>';}).join('');
  document.getElementById('dpVars').innerHTML=s.vars.map(function(v){return '<span class="var-chip">'+v+'</span>';}).join('');
  var p=document.getElementById('detailPanel');
  p.classList.remove('visible'); void p.offsetWidth; p.classList.add('visible');
}
</script>
